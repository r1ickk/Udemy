<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Contatos</title>
    <link rel="stylesheet" href="estilo.css">

</head>

<body>
    <h1 class="main-title">Lista de contatos</h1>

    <div class="list-wrapper">
        <ul class="list">
            <li class="list-item">
                <div class="list-item_imagem"> <!-- O _ impede que o estilo seja vazado para fora do componente -->
                    <img src="imagens/1.jpg" alt="Brennan George">
                </div>
                
                <div class="list-item__content">
                    <p class="list-item__name">Brennan George</p>
                    <p class>brennan.george@example.com</p>
                </div>
                
            </li>
        </ul>
    </div>

</body>

</html>
